name: Auth Service CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'auth-service/src/**'
      - 'auth-service/test/**'
      - 'auth-service/package.json'
      - 'auth-service/package-lock.json'
      - 'auth-service/tsconfig.json'
      - 'auth-service/jest.config.js'
      - 'auth-service/jest.setup.js'
      - 'auth-service/Dockerfile'
      - '.github/workflows/**'

jobs:

  build-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  docker:

    runs-on: ubuntu-latest
    needs: build-test

    steps:

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}
